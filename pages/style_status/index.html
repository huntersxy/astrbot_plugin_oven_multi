<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>烤箱 - 状态总览</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎛️ 烤箱状态总览</h1>
      <button id="refreshBtn">🔄 刷新</button>
    </header>

    <!-- 余额查询 -->
    <section class="section">
      <h2>💰 余额查询</h2>
      <div id="balance-loading" class="loading">
        <div class="spinner"></div>
        <p>查询中...</p>
      </div>
      <div id="balance-content" style="display: none;">
        <div id="balance-list" class="card-grid"></div>
      </div>
      <div id="balance-error" class="error" style="display: none;">
        <p>查询失败，请检查配置</p>
      </div>
    </section>

    <!-- 风格学习 -->
    <section class="section">
      <h2>🎨 风格学习</h2>
      <div id="style-loading" class="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
      <div id="style-content" style="display: none;">
        <div id="style-list" class="session-list"></div>
      </div>
      <div id="style-empty" class="empty" style="display: none;">
        <p>暂无风格学习数据</p>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
